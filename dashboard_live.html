<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股訊號儀表板</title>
<style>
  :root{
    --bg:#f5f6f8;
    --panel:#ffffff;
    --line:#e3e6ea;
    --ink:#1c2430;
    --sub:#6b7684;
    --up:#d1443a;
    --down:#1f9254;
    --accent:#2456c4;
    --accent-soft:#eaf0ff;
    --amber:#b9820a;
    --amber-soft:#fff6df;
    --red-strong:#c62828;
    --red-soft:#fdeaea;
    --green-soft:#e9f7ef;
    --purple:#7b4fd6;
    --purple-soft:#f2ecfd;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --sans: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--sans);
    background:var(--bg);
    color:var(--ink);
    font-size:13px;
    -webkit-font-smoothing:antialiased;
  }
  .topbar{
    background:var(--panel);
    border-bottom:1px solid var(--line);
    padding:10px 16px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:18px;
  }
  .ctrl{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--sub);}
  .ctrl select, .ctrl input[type=number]{
    border:1px solid var(--line);
    border-radius:6px;
    padding:4px 8px;
    font-size:12.5px;
    color:var(--ink);
    background:#fff;
  }
  .banks{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .banks label{display:flex;align-items:center;gap:4px;font-size:12.5px;color:var(--ink);white-space:nowrap;}
  .refresh-btn{
    margin-left:auto;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:7px 16px;
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
  }
  .refresh-btn:hover{background:#1d45a5;}

  .status-line{
    padding:7px 16px;
    background:var(--green-soft);
    color:#1f6b3e;
    font-size:12.5px;
    border-bottom:1px solid var(--line);
    display:flex;
    gap:18px;
    flex-wrap:wrap;
  }
  .status-line b{font-weight:700;}

  .tabs{
    display:flex;
    overflow-x:auto;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    padding:0 8px;
  }
  .tab{
    padding:10px 14px;
    font-size:12.5px;
    white-space:nowrap;
    cursor:pointer;
    color:var(--sub);
    border-bottom:2px solid transparent;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .tab:hover{color:var(--ink);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;background:var(--accent-soft);}

  .page{display:none;padding:16px;}
  .page.active{display:block;}

  .page-title{font-size:19px;font-weight:800;margin:0 0 10px 0;display:flex;align-items:center;gap:8px;}
  .subtitle-box{
    background:#fffbea;
    border:1px solid #f0e0a6;
    border-radius:8px;
    padding:10px 14px;
    font-size:12.5px;
    color:#7a5c00;
    margin-bottom:10px;
    line-height:1.6;
  }
  .stat-box{
    background:var(--green-soft);
    border:1px solid #c8e8d4;
    border-radius:8px;
    padding:9px 14px;
    font-size:12.5px;
    color:#1f6b3e;
    margin-bottom:10px;
  }
  .stat-box.red{background:var(--red-soft);border-color:#f0c6c3;color:#a53a33;}
  .stat-box.blue{background:var(--accent-soft);border-color:#c8d7f5;color:#1d3f8f;}

  .filter-row{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:12px;
  }
  .chip{
    border:1px solid var(--line);
    background:#fff;
    border-radius:16px;
    padding:6px 14px;
    font-size:12.5px;
    cursor:pointer;
    color:var(--ink);
    display:flex;
    align-items:center;
    gap:5px;
  }
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .filter-meta{margin-left:auto;font-size:12.5px;color:var(--sub);display:flex;gap:14px;flex-wrap:wrap;}
  .filter-meta b{color:var(--ink);}

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border-radius:8px;
    overflow:hidden;
    font-size:12.5px;
  }
  thead th{
    background:#f0f2f5;
    color:var(--sub);
    font-weight:700;
    text-align:left;
    padding:9px 10px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
    position:sticky;top:0;
  }
  tbody td{
    padding:8px 10px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  tbody tr:hover{background:#f7f9fc;cursor:pointer;}
  .num{font-family:var(--mono);}
  .up{color:var(--up);font-weight:700;}
  .down{color:var(--down);font-weight:700;}
  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:8px;}

  .badge{
    display:inline-flex;align-items:center;gap:4px;
    padding:3px 9px;border-radius:5px;font-weight:700;font-size:12px;white-space:nowrap;
  }
  .badge.strong-bull{background:var(--red-soft);color:var(--red-strong);}
  .badge.bull{background:#fdeeea;color:#c2542c;}
  .badge.watch{background:var(--green-soft);color:#1f8a4c;}
  .badge.pullback{background:var(--amber-soft);color:var(--amber);}
  .badge.trial{background:var(--purple-soft);color:var(--purple);}
  .badge.neutral{background:#eef0f3;color:var(--sub);}
  .badge.avoid{background:#f1e2e2;color:#8a2f2f;}

  .score-cell{
    display:inline-block;min-width:34px;text-align:center;
    padding:3px 0;border-radius:5px;font-weight:800;color:#fff;font-family:var(--mono);
  }
  .signal-tag{display:inline-block;font-size:11.5px;color:var(--sub);margin-right:6px;}
  .footer-bar{
    margin-top:10px;font-size:12px;color:var(--sub);
    display:flex;gap:18px;flex-wrap:wrap;padding:8px 4px;
  }
  .kpi-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
  .kpi{
    flex:1;min-width:140px;background:var(--panel);border:1px solid var(--line);
    border-radius:8px;padding:10px 14px;
  }
  .kpi .label{font-size:11.5px;color:var(--sub);margin-bottom:4px;}
  .kpi .value{font-size:20px;font-weight:800;font-family:var(--mono);}
  .risk-light{
    display:inline-flex;align-items:center;gap:6px;background:var(--red-soft);
    color:var(--red-strong);border:1px solid #f0c6c3;border-radius:8px;padding:8px 16px;
    font-weight:800;font-size:13.5px;float:right;
  }
  .dot{width:9px;height:9px;border-radius:50%;background:var(--red-strong);display:inline-block;}
  .risk-level{padding:3px 8px;border-radius:5px;font-weight:700;font-size:11.5px;}
  .risk-level.high{background:var(--red-strong);color:#fff;}
  .risk-level.warn{background:var(--amber-soft);color:var(--amber);}
  select#bank-select-hint{display:none;}
  .global-badge{
    float:right;background:#eef0f3;border:1px solid var(--line);border-radius:6px;
    padding:5px 12px;font-size:12.5px;color:var(--sub);
  }
  .env-block{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:14px;margin-bottom:14px;
  }
  .env-block h3{margin:0 0 8px 0;font-size:13.5px;display:flex;align-items:center;gap:6px;}
  .taiex-strip{
    display:flex;gap:22px;align-items:center;background:var(--accent-soft);
    border:1px solid #c8d7f5;border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:13px;
  }
  .taiex-strip b{font-size:18px;font-family:var(--mono);}
</style>
</head>
<body>

<div class="topbar">
  <div class="ctrl">區間：
    <select><option>5 日</option><option>10 日</option><option>20 日</option></select>
  </div>
  <div class="ctrl">排序：
    <select><option>淨買賣超張數</option><option>綜合分數</option><option>漲跌%</option></select>
  </div>
  <div class="ctrl">Top N：<input type="number" value="30" style="width:56px;"></div>
  <div class="ctrl">銀行：
    <div class="banks">
      <label><input type="checkbox" checked>合作金庫</label>
      <label><input type="checkbox" checked>土銀</label>
      <label><input type="checkbox" checked>台銀</label>
      <label><input type="checkbox" checked>臺企銀</label>
      <label><input type="checkbox" checked>彰銀</label>
      <label><input type="checkbox" checked>第一銀</label>
      <label><input type="checkbox" checked>兆豐銀</label>
